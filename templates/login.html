<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NMC Gatepass</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light min-vh-100 d-flex flex-column">
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5 col-xl-4">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-header bg-dark text-white text-center py-4 rounded-top-4 border-bottom-0">
                        <i class="bi bi-shield-lock-fill fs-1 mb-2"></i>
                        <h3 class="mb-0 fw-bold">NMC College</h3>
                        <p class="mb-0 opacity-75">Security Administrative Access</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST" action="/login" class="needs-validation" novalidate>
                            <div class="mb-4">
                                <label for="username" class="form-label fw-semibold text-secondary">Username</label>
                                <input type="text" class="form-control form-control-lg" id="username" name="username"
                                    required placeholder="Enter username">
                                <div class="invalid-feedback">Username is required.</div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password"
                                    name="password" required placeholder="Enter password">
                                <div class="invalid-feedback">Password is required.</div>
                            </div>

                            <div class="d-grid gap-2 mt-5">
                                <button type="submit"
                                    class="btn btn-dark btn-lg rounded-pill fw-bold shadow-sm py-3">Login
                                    Securely</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="{{ url_for('index') }}" class="text-decoration-none text-secondary"><i
                            class="bi bi-arrow-left me-1"></i>Back to Registration Form</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
